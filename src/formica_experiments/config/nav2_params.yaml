# nav2_params.yaml
# Nav2 stack parameters for FormicaBot differential drive
# Updated for ROS2 Humble Hawksbill (Nav2 1.x API)
# Tuned for: robot max ~0.20 m/s; Nav2 linear cap below that for safety. Maze exp4 was timing out at 0.07 m/s
# (420 s) with excessive path length — slightly higher cap + looser goal + longer BT/progress allowances.

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_footprint
    global_frame_id: map
    laser_max_range: 10.0
    # Match costmap obstacle_min_range so close walls in the maze still update the particle filter.
    laser_min_range: 0.12
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: odom
    # NOTE: odom_model_type renamed to robot_model_type in Humble's AMCL
    robot_model_type: nav2_amcl::DifferentialMotionModel
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    # Default navigate_to_pose_w_replanning_and_recovery.xml calls ComputePathToPose at 1 Hz → constant
    # follow_path preemption and ~1 path/s on /plan (seen as 157 replans / 180 s). Replan only when
    # IsPathValid fails; keep spin/wait/backup/clear recoveries. Path must be absolute (not bare name).
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_recovery_and_replanning_only_if_path_becomes_invalid.xml"
    # 10 ms → 100 Hz; Jetson under load hit "Behavior Tree tick rate exceeded" and aborted goals instantly.
    bt_loop_duration: 50
    # Slow maze legs + recoveries: avoid BT action timeouts well below EXP4_TRIAL_TIMEOUT_S (420).
    default_server_timeout: 600
    wait_for_service_timeout: 1000
    # Full list must match Humble default BTs (e.g. RemovePassedGoals, cancel nodes).
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    # 10 Hz + DWB (many samples) missed the deadline on Jetson → jerky control; 5 Hz is stable here.
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.55
    progress_checker_plugin: progress_checker
    goal_checker_plugins:
      - goal_checker
    # Humble warns if unset; must match an entry in goal_checker_plugins.
    current_goal_checker: goal_checker
    controller_plugins:
      - FollowPath
    # SimpleProgressChecker only tracks XY; maze navigation often rotates in place for long
    # stretches — no 0.03 m translation → false "Failed to make progress" after ~45 s.
    progress_checker:
      plugin: nav2_controller::PoseProgressChecker
      required_movement_radius: 0.02
      movement_time_allowance: 360.0
      required_movement_angle: 0.28
    goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.40
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.10
      max_vel_y: 0.0
      max_vel_theta: 0.55
      min_speed_xy: 0.0
      max_speed_xy: 0.10
      min_speed_theta: 0.0
      acc_lim_x: 0.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 12
      vy_samples: 1
      vtheta_samples: 12
      sim_time: 1.8
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.30
      # MUST be < max_vel_x. Keep below trans_stopped / oscillation thresholds for this base.
      trans_stopped_velocity: 0.018
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      BaseObstacle.scale: 1.15
      PathAlign.scale: 18.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 18.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 3.0
      RotateToGoal.lookahead_time: -1.0

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins:
      - simple_smoother
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false
      rolling_window: true
      # 3×3 m too small for map→odom drift (plan outside local costmap → DWB ABORT). 8×8 made
      # bt_navigator lifecycle get_state time out on Jetson; 6×6 is the compromise.
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.17
      plugins:
        - obstacle_layer
        - inflation_layer
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.20
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.8
        inflation_radius: 0.24
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false
      robot_radius: 0.17
      resolution: 0.05
      # Maze SLAM map has large unknown regions; lethal unknown + LiDAR often seals Navfn. Prefer traversable unknown for global planning (local costmap + scan still avoids real hits).
      track_unknown_space: false
      # Global: static map only — Navfn gets paths in this maze; adding inflation or /scan here re-sealed corridors. Local costmap still has inflation + LiDAR.
      plugins:
        - static_layer
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: /home/jetson/master_ws/my_first_map.yaml

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false
    planner_plugins:
      - GridBased
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.85
      use_astar: true
      allow_unknown: true

# Renamed from recoveries_server in Humble
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      - spin
      - backup
      - drive_on_heading
      - assisted_teleop
      - wait
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    global_frame: odom
    robot_base_frame: base_footprint
    transform_timeout: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# Bond / discovery: Jetson can take >4s to configure costmaps; default bond timeout is too tight.
lifecycle_manager_localization:
  ros__parameters:
    bond_timeout: 40.0

lifecycle_manager_navigation:
  ros__parameters:
    bond_timeout: 40.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: false

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.10, 0.0, 0.55]
    min_velocity: [-0.10, 0.0, -0.55]
    max_accel: [0.5, 0.0, 3.2]
    max_decel: [-0.5, 0.0, -3.2]
    odom_topic: odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
