# slam_params.yaml
# SLAM Toolbox parameters tuned for the FormicaBot / RPLIDAR A1
# Reference: https://github.com/SteveMacenski/slam_toolbox

slam_toolbox:
  ros__parameters:

    # Plugin selection
    solver_plugin:              solver_plugins::CeresSolver
    ceres_linear_solver:        SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:       SCHUR_JACOBI
    ceres_trust_strategy:       LEVENBERG_MARQUARDT
    ceres_dogleg_type:          TRADITIONAL_DOGLEG
    ceres_loss_function:        None

    # ROS topics
    odom_frame:                 odom
    map_frame:                  map
    base_frame:                 base_footprint
    scan_topic:                 /scan
    use_map_saver:              true
    mode:                       mapping

    # Update frequencies (RPLIDAR A1 max 10 Hz)
    map_update_interval:        0.5
    resolution:                 0.05     # 5 cm per cell
    max_laser_range:            10.0     # metres
    minimum_range:              0.25     # filter out self-observations
    minimum_travel_distance:    0.20
    minimum_travel_heading:     0.20

    # Loop closure
    loop_search_distance:       3.0
    loop_match_minimum_response_coarse:  0.35
    loop_match_minimum_response_fine:    0.45

    # Visualisation
    debug_logging:              false
    throttle_scans:             1
    transform_publish_period:   0.02
    map_file_name:              /tmp/formica_map
    map_start_pose:             [0.0, 0.0, 0.0]
