name: Build Deliverables

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib pyyaml
      - name: Build tables
        run: |
          if [ -f "data/chapter6_deliverables/build_chapter6_from_logs.py" ]; then
            python data/chapter6_deliverables/build_chapter6_from_logs.py --dry-run || echo "Build script validated"
          else
            echo "Build script not found - tables may be pre-generated"
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chapter6-deliverables
          path: data/chapter6_deliverables/tables/