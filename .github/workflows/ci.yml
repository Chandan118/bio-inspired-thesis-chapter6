name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Lint Python files
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

  ros1-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Check ROS 1 script syntax
        run: |
          python -m py_compile src/formica_experiments_ros1/scripts/exp1_sensor_calibration.py
          python -m py_compile src/formica_experiments_ros1/scripts/exp2_power_profiling.py
          python -m py_compile src/formica_experiments_ros1/scripts/exp3_slam_mapping.py
          python -m py_compile src/formica_experiments_ros1/scripts/exp4_maze_navigation.py
          python -m py_compile src/formica_experiments_ros1/scripts/exp5_obstacle_fault.py
          python -m py_compile src/formica_experiments_ros1/scripts/exp6_cnn_detection.py
          python -m py_compile src/formica_experiments_ros1/scripts/exp7_pheromone_trail.py
          echo "✅ All ROS 1 scripts syntax OK"

  ros2-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Check ROS 2 script syntax
        run: |
          python -m py_compile src/formica_experiments/formica_experiments/exp1_sensor_calibration.py
          python -m py_compile src/formica_experiments/formica_experiments/exp2_power_profiling.py
          python -m py_compile src/formica_experiments/formica_experiments/exp3_slam_mapping.py
          python -m py_compile src/formica_experiments/formica_experiments/exp4_maze_navigation.py
          python -m py_compile src/formica_experiments/formica_experiments/exp5_obstacle_fault.py
          python -m py_compile src/formica_experiments/formica_experiments/exp6_cnn_detection.py
          python -m py_compile src/formica_experiments/formica_experiments/exp7_pheromone_trail.py
          echo "✅ All ROS 2 scripts syntax OK"

  data-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify data directories
        run: |
          echo "=== Chapter 6 Deliverables ==="
          ls -la data/chapter6_deliverables/tables/ 2>/dev/null || echo "Tables dir not yet populated"
          ls -la data/chapter6_deliverables/figures/ 2>/dev/null || echo "Figures dir not yet populated"
          echo ""
          echo "=== Raw Logs ==="
          ls -la data/raw_logs/ 2>/dev/null || echo "Raw logs not yet added"
          echo ""
          echo "=== Aliengo Model ==="
          ls -la data/aliengo_model/ 2>/dev/null || echo "Aliengo model not yet added"