name: Validate Structure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check experiment files exist
        run: |
          echo "=== ROS 2 Experiment Files ==="
          ls -la src/formica_experiments/formica_experiments/exp*.py
          echo ""
          echo "=== ROS 1 Experiment Files ==="
          ls -la src/formica_experiments_ros1/scripts/exp*.py
          echo ""
          echo "=== Appeal Simulations ==="
          ls -la src/appeal_experiments/simulation*.py
          echo ""
          echo "=== Chapter 6 Tables ==="
          ls -la data/chapter6_deliverables/tables/ 2>/dev/null || echo "Tables not yet generated"
          echo ""
          echo "=== Aliengo Model ==="
          ls -la data/aliengo_model/ 2>/dev/null || echo "Model data not yet added"

      - name: Verify Python syntax
        run: |
          python -m py_compile src/formica_experiments_ros1/scripts/data_logger.py
          python -m py_compile src/formica_experiments_ros1/scripts/hardware_checker.py
          echo "✅ Python syntax check passed"

      - name: Verify package.xml files
        run: |
          test -f src/formica_experiments/package.xml && echo "✅ ROS 2 package.xml exists"
          test -f src/formica_experiments_ros1/package.xml && echo "✅ ROS 1 package.xml exists"
          test -f src/formica_experiments_ros1/CMakeLists.txt && echo "✅ CMakeLists.txt exists"

  data-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify deliverable tables
        run: |
          echo "=== Chapter 6 Table Count ==="
          TABLE_COUNT=$(ls -1 data/chapter6_deliverables/tables/*.csv 2>/dev/null | wc -l)
          echo "Found $TABLE_COUNT table files"
          if [ "$TABLE_COUNT" -ge 7 ]; then
            echo "✅ All 7+ tables present"
          else
            echo "⚠️  Some tables may be missing (expected 7+)"
          fi
      - name: Verify Aliengo model data
        run: |
          if [ -f data/aliengo_model/experiment_data.csv ]; then
            echo "✅ Aliengo data file exists"
            head -3 data/aliengo_model/experiment_data.csv
          else
            echo "⚠️  Aliengo data not yet added"
          fi